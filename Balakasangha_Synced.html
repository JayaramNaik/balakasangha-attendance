<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balakasangha Attendance — Vivekananda Balaka Sangha</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;color:#1a1a1a;background:#f5f5f3;font-size:14px}
.app{max-width:960px;margin:0 auto;padding:1rem}
h1{font-size:22px;font-weight:700;margin-bottom:2px}
.subtitle{font-size:13px;color:#666;margin-bottom:1rem}
input,select,button{font-family:inherit;outline:none;border:1px solid #d0d0cc}
input:focus,select:focus{border-color:#378ADD}
button{cursor:pointer;background:#fff}



/* Top bar */
.top-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:.8rem;background:#fff;padding:10px 14px;border-radius:10px;border:1px solid #e0e0dc;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.top-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.top-bar label{font-size:12px;color:#666;white-space:nowrap}
.top-bar select{height:32px;padding:0 8px;font-size:13px;border-radius:6px}
.sundays-wrap{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sunday-btn{padding:3px 11px;font-size:12px;border:1px solid #d0d0cc;border-radius:20px;background:#fff;cursor:pointer;color:#555;transition:all .12s}
.sunday-btn.active{background:#EBF3FC;color:#0C447C;border-color:#378ADD;font-weight:600}
.session-info{font-size:11px;color:#888;margin-bottom:.6rem}

/* Main nav */
.main-nav{display:flex;border-bottom:2px solid #e0e0dc;margin-bottom:.8rem}
.main-tab{padding:8px 20px;border:none;border-bottom:2.5px solid transparent;background:none;cursor:pointer;font-size:13px;color:#666;font-weight:400;margin-bottom:-2px;transition:all .12s}
.main-tab.active{color:#0C447C;border-bottom-color:#378ADD;font-weight:700}

/* Type tabs */
.type-tabs{display:flex;gap:8px;margin-bottom:.8rem}
.type-tab{padding:6px 18px;border:1px solid #d0d0cc;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-size:13px;font-weight:500;transition:all .12s}
.type-tab[data-type="old"].active{background:#EDF7F2;color:#085041;border-color:#1D9E75;font-weight:700}
.type-tab[data-type="new"].active{background:#FEF3E7;color:#6B3200;border-color:#D85A30;font-weight:700}

/* School sub-tabs */
.school-tabs{display:flex;gap:5px;margin-bottom:.8rem}
.school-tab{padding:4px 14px;border:1px solid #d0d0cc;border-radius:20px;background:#fff;color:#555;cursor:pointer;font-size:12px;transition:all .12s}
.school-tab.active{background:#EBF3FC;color:#0C447C;border-color:#378ADD;font-weight:700}

/* Summary */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:7px;margin-bottom:.8rem}
.metric{background:#fff;border-radius:8px;padding:9px 11px;border:1px solid #e8e8e4}
.metric-label{font-size:10px;color:#888;margin-bottom:2px}
.metric-value{font-size:20px;font-weight:700}
.mv-blue{color:#185FA5}.mv-green{color:#0F6E56}.mv-red{color:#993C1D}

/* Controls */
.controls{display:flex;gap:6px;margin-bottom:.6rem;flex-wrap:wrap;align-items:center}
.controls input[type=text]{flex:1;min-width:120px;height:30px;padding:0 8px;font-size:13px;border-radius:6px}
.controls select{height:30px;padding:0 7px;font-size:12px;border-radius:6px}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid}
.btn-green{background:#E1F5EE;color:#085041;border-color:#1D9E75}
.btn-red{background:#FCEBEB;color:#791F1F;border-color:#D85A30}
.btn-export{background:#185FA5;color:#fff;border:none;padding:0 14px;height:30px;font-size:12px;border-radius:6px;cursor:pointer;font-weight:600}
.btn-export:hover{background:#0C447C}
.add-row{display:flex;gap:6px;margin-bottom:.8rem;flex-wrap:wrap}
.add-row input{flex:1;min-width:120px;height:30px;padding:0 8px;font-size:13px;border-radius:6px}
.add-row button{height:30px;padding:0 12px;font-size:12px;border-radius:6px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e8e8e4}
thead th{text-align:left;font-weight:600;font-size:11px;color:#888;padding:7px 8px;border-bottom:1px solid #e8e8e4;background:#fafaf8}
tbody tr{border-bottom:1px solid #f0f0ec}
tbody tr:hover{background:#fafaf8}
tbody td{padding:6px 8px;vertical-align:middle}
.col-num{width:30px}.col-name{min-width:100px}.col-check{width:66px;text-align:center}.col-sessions{width:105px}.col-streak{width:58px;text-align:center}.col-bar{width:80px}.col-del{width:32px;text-align:center}
.present-check{accent-color:#1D9E75;width:16px;height:16px;cursor:pointer}
.absent-check{accent-color:#D85A30;width:16px;height:16px;cursor:pointer}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill-green{background:#E1F5EE;color:#085041}.pill-amber{background:#FAEEDA;color:#633806}.pill-red{background:#FCEBEB;color:#791F1F}.pill-gray{background:#f0f0ec;color:#888}
.pct-bar{height:4px;background:#f0f0ec;border-radius:4px;overflow:hidden;margin-top:2px}
.pct-fill{height:100%;border-radius:4px}
.del-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:14px;padding:2px 4px;border-radius:4px}
.del-btn:hover{color:#D85A30;background:#FCEBEB}

/* Panels */
.panel{display:none}.panel.visible{display:block}
.empty-state{text-align:center;padding:2rem;color:#888;font-size:13px}

/* Loading */
.loading{text-align:center;padding:2rem;color:#888;font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0dc;border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sync status */
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;margin-bottom:.6rem}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.sync-dot.synced{background:#1D9E75}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
.sync-dot.error{background:#D85A30}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Analytics */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:1.2rem}
.chart-card{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:14px}
.chart-title{font-size:12px;font-weight:700;margin-bottom:3px}
.chart-subtitle{font-size:11px;color:#888;margin-bottom:8px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:10px;color:#666}
.legend span{display:flex;align-items:center;gap:3px}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.analytics-h3{font-size:14px;font-weight:700;margin-bottom:.8rem;padding-bottom:6px;border-bottom:1px solid #e8e8e4}
.section-block{margin-bottom:1.5rem}
.export-bar{display:flex;justify-content:flex-end;margin-bottom:.8rem}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:#1D9E75;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9998}
#toast.show{opacity:1}

.login-panel{max-width:420px;margin:3rem auto;padding:24px;background:#fff;border:1px solid #e2e2df;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.login-panel h2{font-size:20px;margin-bottom:12px}
.login-panel p{font-size:13px;color:#555;margin-bottom:18px}
.login-panel input{width:100%;height:40px;margin-bottom:12px;padding:0 12px;border-radius:8px;border:1px solid #d0d0cc}
.login-panel button{width:100%;height:40px;margin-top:10px;border-radius:8px;border:none;background:#185FA5;color:#fff;font-weight:600}
.login-panel .secondary-btn{background:#fff;color:#185FA5;border:1px solid #185FA5}
.login-panel .auth-actions{display:grid;gap:10px;margin-top:12px}
.login-panel .auth-note{font-size:12px;color:#777;margin-top:10px;text-align:center}
@media(max-width:480px){
  .col-bar,.col-streak{display:none}
  .col-check{width:50px}.col-sessions{width:80px}
  .type-tab{padding:5px 12px;font-size:12px}
  .main-tab{padding:7px 12px;font-size:12px}
}
</style>
</head>
<body>

<div id="login-screen" class="login-panel">
  <h2>Volunteer sign in</h2>
  <p>Sign in with your email and password to access the attendance app.</p>
  <input type="email" id="auth-email" placeholder="Email address">
  <input type="password" id="auth-password" placeholder="Password">
  <div class="auth-actions">
    <button onclick="signIn()">Sign in</button>
    <button class="secondary-btn" onclick="registerUser()">Register new volunteer</button>
  </div>
  <div class="auth-note">If volunteers are already registered, use Sign in. Otherwise register one account and share credentials securely.</div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none">
  <h1>🕉 Balakasangha Attendance</h1>
  <p class="subtitle">Vivekananda Balaka Sangha — Sunday sessions tracker</p>

  <div class="top-bar">
    <div class="top-row">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span id="user-label" style="font-size:12px;color:#555"></span>
        </div>
        <button class="btn-sm btn-red" id="sign-out-btn" style="margin-left:auto;display:none" onclick="signOutUser()">Sign out</button>
    </div>
    <div class="top-row">
      <label>Month:</label>
      <select id="month-sel" onchange="onMonthChange()"></select>
      <label>Year:</label>
      <select id="year-sel" onchange="onMonthChange()"></select>
    </div>
    <div class="sundays-wrap" id="sundays-row"></div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Not synced</span>
  </div>
  <div id="session-info" class="session-info"></div>

  <div class="main-nav">
    <button class="main-tab active" data-view="attendance">📋 Attendance</button>
    <button class="main-tab" data-view="analytics">📊 Analytics</button>
  </div>

  <!-- ATTENDANCE VIEW -->
  <div id="attendance-view" class="panel visible">
    <div class="type-tabs">
      <button class="type-tab active" data-type="old">🎓 Old Students</button>
      <button class="type-tab" data-type="new">🌱 New Students</button>
    </div>
    <div id="old-view" class="panel visible">
      <div class="school-tabs">
        <button class="school-tab active" data-key="old-middle">Middle School</button>
        <button class="school-tab" data-key="old-high">High School</button>
      </div>
      <div id="panel-old-middle" class="panel visible"></div>
      <div id="panel-old-high" class="panel"></div>
    </div>
    <div id="new-view" class="panel">
      <div class="school-tabs">
        <button class="school-tab active" data-key="new-middle">Middle School</button>
        <button class="school-tab" data-key="new-high">High School</button>
      </div>
      <div id="panel-new-middle" class="panel visible"></div>
      <div id="panel-new-high" class="panel"></div>
    </div>
  </div>

  <!-- ANALYTICS VIEW -->
  <div id="analytics-view" class="panel">
    <div id="analytics-content"></div>
  </div>
</div>

<div id="toast"></div>

<!-- Debug panel (toggle with the Show debug button) -->


<script>
// ===================== CONFIG =====================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVLWhUUIKCqDF_4EwjKf65GFFwW_cqw81cajUVm7d60ZWLzcjDmozd-08Mq4sp7uKH/exec";
// =================================================

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SECTIONS={
  'old-middle':{label:'Old Students — Middle School',type:'old',color:'#1D9E75'},
  'old-high':  {label:'Old Students — High School',  type:'old',color:'#185FA5'},
  'new-middle':{label:'New Students — Middle School',type:'new',color:'#D85A30'},
  'new-high':  {label:'New Students — High School',  type:'new',color:'#C07A00'},
};
const SEC_KEYS=Object.keys(SECTIONS);

// State
let students={'old-middle':[],'old-high':[],'new-middle':[],'new-high':[]};
let records={};
const now=new Date();
let curMonth=now.getMonth(),curYear=now.getFullYear();
let curDate=null,curView='attendance',curType='old';
let curSchool={old:'old-middle',new:'new-middle'};
const chartInstances={};

// Firebase config — replace these values with your Firebase project settings
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAGpZNwnekU2BEpEbmIHmsMWYBI2fI7KcE",
  authDomain: "balakasangha-attendance.firebaseapp.com",
  projectId: "balakasangha-attendance",
  storageBucket: "balakasangha-attendance.appspot.com",
  messagingSenderId: "814303496942",
  appId: "1:814303496942:web:5cf712e73513480f5b81ff"
};
const STATE_DOC_PATH = 'attendance/state';
let db=null;
let auth=null;
let currentUser=null;
let stateDoc=null;

function setSyncStatus(status,msg){
  const dot=document.getElementById('sync-dot');
  const label=document.getElementById('sync-label');
  dot.className='sync-dot '+status;
  label.textContent=msg;
}

function persistLocal(){
  try{ localStorage.setItem('balaka_students', JSON.stringify(students)); }catch(e){}
  try{ localStorage.setItem('balaka_records', JSON.stringify(records)); }catch(e){}
}

async function initFirebase(){
  try{
    if(!FIREBASE_CONFIG.projectId || FIREBASE_CONFIG.projectId==='YOUR_PROJECT_ID'){
      throw new Error('Firebase configuration not set');
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    stateDoc = db.doc(STATE_DOC_PATH);

    // Real-time listener so changes on one device appear on others immediately
    stateDoc.onSnapshot(snapshot=>{
      if(snapshot.exists){
        const data = snapshot.data();
        SEC_KEYS.forEach(key=>{students[key]=data.students?.[key]||[];});
        records = data.records || {};
        setSyncStatus('synced','Synced with Firebase');
        renderCurrent();
      }
    }, err=>{ setSyncStatus('error','Firebase sync error'); });

    auth.onAuthStateChanged(async user=>{
      currentUser = user;
      if(user){
        showApp(user);
        try{ await loadState(); }catch(e){}
      } else {
        showLogin();
      }
    });
  }catch(e){
    setSyncStatus('error','Firebase init failed');
    showToast('Firebase setup incomplete');
  }
}

async function loadState(){

  setSyncStatus('syncing','Loading shared data...');
  try{
    if(!stateDoc) throw new Error('Firebase not initialized');
    const snapshot = await stateDoc.get();
    if(snapshot.exists){
      const data = snapshot.data();
      SEC_KEYS.forEach(key=>{students[key]=data.students?.[key]||[];});
      records = data.records || {};
    } else {
      SEC_KEYS.forEach(key=>students[key]=[]);
      records={};
      await saveState();
    }
    setSyncStatus('synced','Loaded shared data');
  }catch(e){
    // Fallback to local storage if Firebase fails
    const storedStudents = localStorage.getItem('balaka_students');
    const storedRecords = localStorage.getItem('balaka_records');
    if(storedStudents){
      const data = JSON.parse(storedStudents);
      SEC_KEYS.forEach(key=>{students[key]=data[key]||[];});
    }
    records = storedRecords? JSON.parse(storedRecords) : {};
    setSyncStatus('synced','Loaded local data (offline)');
  }
}

async function saveState(){
  setSyncStatus('syncing','Saving...');
  try{
    if(stateDoc){
      await stateDoc.set({students,records}, {merge:true});
      setSyncStatus('synced','Saved to Firebase ✓');
    } else {
      throw new Error('Firebase unavailable');
    }
  }catch(e){
    persistLocal();
    setSyncStatus('synced','Saved locally');
  }
}

// ===================== INIT =====================
window.addEventListener('load', initApp);
const monthSel=document.getElementById('month-sel');
const yearSel=document.getElementById('year-sel');
MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;if(i===curMonth)o.selected=true;monthSel.appendChild(o);});
for(let y=curYear-2;y<=curYear+3;y++){const o=document.createElement('option');o.value=y;o.textContent=y;if(y===curYear)o.selected=true;yearSel.appendChild(o);}

async function initApp(){
  await initFirebase();
  setInterval(async()=>{
    if(currentUser){
      await loadState();
      renderCurrent();
    }
  }, 30000);
}

function showLogin(){
  document.getElementById('login-screen').style.display='block';
  document.getElementById('main-app').style.display='none';
  setSyncStatus('error','Please sign in to sync');
}

function showApp(user){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-label').textContent='Signed in as '+(user.email||user.uid);
  document.getElementById('sign-out-btn').style.display='inline-flex';
  // debug toggle removed
  buildSundayBtns();
  renderCurrentSection();
}

function signIn(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  if(!email||!password){showToast('Enter email and password');return;}
  setSyncStatus('syncing','Signing in...');
  auth.signInWithEmailAndPassword(email,password).catch(e=>{setSyncStatus('error','Sign in failed');showToast(e.message);});
}

function registerUser(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  if(!email||!password){showToast('Enter email and password');return;}
  setSyncStatus('syncing','Registering...');
  auth.createUserWithEmailAndPassword(email,password).then(()=>{
    showToast('Volunteer registered');
  }).catch(e=>{setSyncStatus('error','Registration failed');showToast(e.message);});
}

function signOutUser(){
  auth.signOut().then(()=>{ showLogin(); setSyncStatus('error','Signed out'); }).catch(e=>{showToast('Sign out failed');});
}

// ===================== SUNDAYS =====================
function getSundays(year,month){
  const res=[];const d=new Date(year,month,1,12,0,0);
  while(d.getMonth()===month){if(d.getDay()===0)res.push(new Date(d));d.setDate(d.getDate()+1);}
  return res;
}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtShort(ds){const[,m,d]=ds.split('-').map(Number);return d+' '+MONTHS[m-1].slice(0,3);}
function fmtFull(ds){const[y,m,d]=ds.split('-').map(Number);return new Date(y,m-1,d,12).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

async function onMonthChange(){
  curMonth=parseInt(monthSel.value);curYear=parseInt(yearSel.value);
  curDate=null;buildSundayBtns();
  await loadMonthAttendance();
  renderCurrent();
}

function buildSundayBtns(){
  const sundays=getSundays(curYear,curMonth);
  const row=document.getElementById('sundays-row');row.innerHTML='';
  if(!sundays.length){row.innerHTML='<span style="font-size:11px;color:#888">No Sundays found</span>';return;}
  const dStrs=sundays.map(fmtDate),todayStr=fmtDate(new Date());
  if(!curDate||!dStrs.includes(curDate))curDate=dStrs[0];
  dStrs.forEach(ds=>{
    const[,m,d]=ds.split('-').map(Number);
    const btn=document.createElement('button');
    btn.className='sunday-btn'+(ds===curDate?' active':'');
    btn.textContent=d+' '+MONTHS[m-1].slice(0,3)+(ds===todayStr?' · today':'');
    btn.onclick=async()=>{curDate=ds;buildSundayBtns();renderCurrent();};
    row.appendChild(btn);
  });
  document.getElementById('session-info').textContent=curDate?'Session: '+fmtFull(curDate):'';
}

// ===================== NAV =====================
document.querySelectorAll('.main-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');curView=btn.dataset.view;
    document.getElementById('attendance-view').classList.toggle('visible',curView==='attendance');
    document.getElementById('analytics-view').classList.toggle('visible',curView==='analytics');
    renderCurrent();
  });
});
document.querySelectorAll('.type-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');curType=btn.dataset.type;
    document.getElementById('old-view').classList.toggle('visible',curType==='old');
    document.getElementById('new-view').classList.toggle('visible',curType==='new');
    renderCurrentSection();
  });
});
document.querySelectorAll('.school-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const type=btn.closest('#old-view')?'old':'new';
    btn.closest('.school-tabs').querySelectorAll('.school-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    const key=btn.dataset.key;curSchool[type]=key;
    document.querySelectorAll('#'+type+'-view .panel').forEach(p=>p.classList.remove('visible'));
    document.getElementById('panel-'+key).classList.add('visible');
    renderSection(key);
  });
});

function renderCurrent(){if(curView==='attendance')renderCurrentSection();else renderAnalytics();}
function renderCurrentSection(){renderSection(curSchool['old']);renderSection(curSchool['new']);}

// ===================== DEBUG HELPERS =====================
// debug helpers removed

// ===================== RECORDS =====================
function getRecord(k,d,i){return records[k+'|'+d+'|'+i]||null;}
function setRecord(k,d,i,v){if(v===null)delete records[k+'|'+d+'|'+i];else records[k+'|'+d+'|'+i]=v;}

function getStats(key,idx){
  const keys=Object.keys(records).filter(k=>k.startsWith(key+'|')&&k.endsWith('|'+idx));
  const dates=[...new Set(keys.map(k=>k.split('|')[1]))].sort();
  const total=dates.length,present=dates.filter(d=>records[key+'|'+d+'|'+idx]==='P').length;
  const pct=total?Math.round(present/total*100):null;
  let streak=0;for(const d of [...dates].reverse()){if(records[key+'|'+d+'|'+idx]==='P')streak++;else break;}
  const mSundays=getSundays(curYear,curMonth).map(fmtDate);
  const mTotal=mSundays.filter(d=>records[key+'|'+d+'|'+idx]).length;
  const mPresent=mSundays.filter(d=>records[key+'|'+d+'|'+idx]==='P').length;
  return{present,total,pct,streak,mPresent,mTotal};
}

function todayStats(key){
  const st=students[key];let p=0,a=0,u=0;
  st.forEach((_,i)=>{const r=getRecord(key,curDate,i);if(r==='P')p++;else if(r==='A')a++;else u++;});
  return{present:p,absent:a,unmarked:u,total:st.length};
}

function barColor(pct){return pct>=75?'#1D9E75':pct>=50?'#EF9F27':'#D85A30';}
function pillClass(pct){return pct===null?'pill-gray':pct>=75?'pill-green':pct>=50?'pill-amber':'pill-red';}

// ===================== RENDER =====================
function renderSection(key){
  const panel=document.getElementById('panel-'+key);if(!panel)return;
  if(!curDate){panel.innerHTML='<div class="empty-state">Select a Sunday session above.</div>';return;}
  const st=students[key];
  const ts=todayStats(key),rate=ts.total?Math.round(ts.present/ts.total*100):0;

  let html=`<div class="export-bar"><button class="btn-export" onclick="exportExcel('${key}')">⬇ Export Excel</button></div>
  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value mv-blue">${st.length}</div></div>
    <div class="metric"><div class="metric-label">Present</div><div class="metric-value mv-green">${ts.present}</div></div>
    <div class="metric"><div class="metric-label">Absent</div><div class="metric-value mv-red">${ts.absent}</div></div>
    <div class="metric"><div class="metric-label">Not marked</div><div class="metric-value">${ts.unmarked}</div></div>
    <div class="metric"><div class="metric-label">Rate</div><div class="metric-value" style="color:${barColor(rate)}">${rate}%</div></div>
  </div>
  <div class="controls">
    <input type="text" placeholder="Search student..." id="search-${key}" oninput="filterTable('${key}')">
    <select id="filter-${key}" onchange="filterTable('${key}')">
      <option value="">All</option><option value="P">Present</option><option value="A">Absent</option><option value="U">Not marked</option>
    </select>
    <button class="btn-sm btn-green" onclick="markAll('${key}','P')">✓ All present</button>
    <button class="btn-sm btn-red" onclick="markAll('${key}','A')">✗ All absent</button>
  </div>
  <div class="add-row">
    <input type="text" id="new-${key}" placeholder="Add student name..." onkeydown="if(event.key==='Enter')addStudent('${key}')">
    <button onclick="addStudent('${key}')">+ Add</button>
  </div>
  <table><thead><tr>
    <th class="col-num">#</th><th class="col-name">Name</th>
    <th class="col-check">Present</th><th class="col-check">Absent</th>
    <th class="col-sessions">Sessions</th><th class="col-streak">Streak</th>
    <th class="col-bar">This month</th><th class="col-del"></th>
  </tr></thead><tbody id="tbody-${key}">`;

  st.forEach((name,i)=>{
    const rec=getRecord(key,curDate,i),s=getStats(key,i);
    const sessLabel=s.total>0?`${s.present} of ${s.total}${s.pct!==null?' ('+s.pct+'%)':''}`:'—';
    const streakHtml=s.streak>0?`<span style="color:#E24B4A;font-size:11px">🔥${s.streak}</span>`:`<span style="color:#aaa;font-size:11px">—</span>`;
    const barHtml=s.mTotal>0?`<div style="font-size:9px;color:#888">${s.mPresent}/${s.mTotal}</div><div class="pct-bar"><div class="pct-fill" style="width:${Math.round(s.mPresent/s.mTotal*100)}%;background:${barColor(Math.round(s.mPresent/s.mTotal*100))}"></div></div>`:'<span style="font-size:10px;color:#aaa">—</span>';
    html+=`<tr data-name="${name.toLowerCase()}" data-rec="${rec||'U'}">
      <td class="col-num" style="color:#aaa">${i+1}</td>
      <td class="col-name" style="font-weight:600">${name}</td>
      <td class="col-check"><input type="checkbox" class="present-check" ${rec==='P'?'checked':''} onchange="mark('${key}',${i},'P',this)"></td>
      <td class="col-check"><input type="checkbox" class="absent-check" ${rec==='A'?'checked':''} onchange="mark('${key}',${i},'A',this)"></td>
      <td class="col-sessions"><span class="pill ${pillClass(s.pct)}">${sessLabel}</span></td>
      <td class="col-streak">${streakHtml}</td>
      <td class="col-bar">${barHtml}</td>
      <td class="col-del"><button class="del-btn" onclick="removeStudent('${key}',${i})">🗑</button></td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  if(!st.length)html+=`<div class="empty-state">No students yet. Add one above.</div>`;
  panel.innerHTML=html;
}

async function mark(key,idx,type,el){
  if(el.checked){setRecord(key,curDate,idx,type);const oc=type==='P'?'absent-check':'present-check';const ob=el.closest('tr').querySelector('.'+oc);if(ob)ob.checked=false;}
  else setRecord(key,curDate,idx,null);
  renderSection(key);filterTable(key);
  await saveState();
}

async function markAll(key,type){
  students[key].forEach((_,i)=>setRecord(key,curDate,i,type));
  renderSection(key);
  await saveState();
  showToast('All marked '+(type==='P'?'present':'absent'));
}

async function addStudent(key){
  const inp=document.getElementById('new-'+key);const name=inp.value.trim();if(!name)return;
  inp.value='';
  setSyncStatus('syncing','Adding student...');
  try{
    students[key].push(name);
    await saveState();
    renderSection(key);
    showToast(name+' added');
  }catch(e){setSyncStatus('error','Failed to add student');showToast('Error adding student');}
}

async function removeStudent(key,idx){
  if(!confirm('Remove '+students[key][idx]+'?'))return;
  const name=students[key][idx];
  setSyncStatus('syncing','Removing...');
  try{
    students[key].splice(idx,1);
    const newRecords={};
    Object.keys(records).forEach(k=>{
      if(!k.startsWith(key+'|')){ newRecords[k]=records[k]; return; }
      const parts=k.split('|'); // [section,date,index]
      const i=parseInt(parts[2],10); const date=parts[1];
      if(i<idx) newRecords[k]=records[k];
      else if(i>idx) newRecords[key+'|'+date+'|'+(i-1)]=records[k];
    });
    records=newRecords;
    await saveState();
    renderSection(key);
    showToast(name+' removed');
  }catch(e){setSyncStatus('error','Failed to remove');showToast('Error removing student');}
}

function filterTable(key){
  const search=(document.getElementById('search-'+key)||{}).value||'';
  const filter=(document.getElementById('filter-'+key)||{}).value||'';
  document.querySelectorAll('#tbody-'+key+' tr').forEach(r=>{
    const nm=!search||r.dataset.name.includes(search.toLowerCase());
    const rc=!filter||r.dataset.rec===filter;
    r.style.display=(nm&&rc)?'':'none';
  });
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ===================== EXPORT =====================
function exportExcel(key){
  persistLocal();
  const sec=SECTIONS[key],st=students[key];
  const sundays=getSundays(curYear,curMonth).map(fmtDate);
  const monthLabel=MONTHS[curMonth]+' '+curYear;
  const header=['#','Student Name',...sundays.map(fmtShort),'Sessions Attended','Total Sessions','Attendance %','Streak'];
  const rows=[header];
  st.forEach((name,i)=>{
    const s=getStats(key,i);
    rows.push([i+1,name,...sundays.map(d=>{const r=records[key+'|'+d+'|'+i];return r==='P'?'P':r==='A'?'A':'';}),s.present,s.total,s.pct!==null?s.pct+'%':'—',s.streak>0?s.streak:'—']);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:24},...sundays.map(()=>({wch:10})),{wch:16},{wch:14},{wch:14},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,sec.label.slice(0,31));
  XLSX.writeFile(wb,`Balakasangha_${key}_${monthLabel.replace(' ','_')}.xlsx`);
  showToast('Excel downloaded!');
}

function exportAllExcel(){
  persistLocal();
  const wb=XLSX.utils.book_new();
  const sundays=getSundays(curYear,curMonth).map(fmtDate);
  const monthLabel=MONTHS[curMonth]+' '+curYear;
  SEC_KEYS.forEach(key=>{
    const sec=SECTIONS[key],st=students[key];
    const header=['#','Student Name',...sundays.map(fmtShort),'Attended','Total','%','Streak'];
    const rows=[header];
    st.forEach((name,i)=>{
      const s=getStats(key,i);
      rows.push([i+1,name,...sundays.map(d=>{const r=records[key+'|'+d+'|'+i];return r==='P'?'P':r==='A'?'A':'';}),s.present,s.total,s.pct!==null?s.pct+'%':'—',s.streak>0?s.streak:'—']);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:4},{wch:24},...sundays.map(()=>({wch:9})),{wch:9},{wch:7},{wch:7},{wch:7}];
    XLSX.utils.book_append_sheet(wb,ws,sec.label.slice(0,31));
  });
  XLSX.writeFile(wb,`Balakasangha_All_${monthLabel.replace(' ','_')}.xlsx`);
  showToast('All sections exported!');
}

// ===================== ANALYTICS =====================
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

function renderAnalytics(){
  const sundays=getSundays(curYear,curMonth).map(fmtDate);
  const labels=sundays.map(fmtShort),monthLabel=MONTHS[curMonth]+' '+curYear;

  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:.8rem">
    <button class="btn-export" onclick="exportAllExcel()">⬇ Export All Sections — Excel</button>
  </div>
  <div class="section-block">
    <div class="analytics-h3">This session — ${curDate?fmtFull(curDate):'none selected'}</div>
    <div class="chart-grid">`;

  SEC_KEYS.forEach(key=>{
    const sec=SECTIONS[key],st=students[key];
    let p=0,a=0,u=0;
    if(curDate&&st.length){st.forEach((_,i)=>{const r=getRecord(key,curDate,i);if(r==='P')p++;else if(r==='A')a++;else u++;});}
    html+=`<div class="chart-card">
      <div class="chart-title">${sec.label}</div>
      <div class="chart-subtitle">${st.length} students</div>
      <div style="position:relative;height:140px"><canvas id="pie-${key}"></canvas></div>
      <div class="legend">
        <span><span class="legend-dot" style="background:#1D9E75"></span>Present ${p}</span>
        <span><span class="legend-dot" style="background:#D85A30"></span>Absent ${a}</span>
        <span><span class="legend-dot" style="background:#888"></span>Unmarked ${u}</span>
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="section-block"><div class="analytics-h3">Monthly trend — ${monthLabel}</div>`;
  SEC_KEYS.forEach(key=>{
    const sec=SECTIONS[key];
    html+=`<div class="chart-card" style="margin-bottom:10px">
      <div class="chart-title">${sec.label} — Sunday-wise attendance %</div>
      <div style="position:relative;height:130px"><canvas id="bar-${key}"></canvas></div>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="section-block"><div class="analytics-h3">All four sections compared — ${monthLabel}</div>
    <div class="chart-card">
      <div class="chart-title">Attendance % per Sunday</div>
      <div style="position:relative;height:210px"><canvas id="bar-all"></canvas></div>
      <div class="legend">${SEC_KEYS.map(k=>`<span><span class="legend-dot" style="background:${SECTIONS[k].color}"></span>${SECTIONS[k].label}</span>`).join('')}</div>
    </div>
  </div>`;

  document.getElementById('analytics-content').innerHTML=html;

  SEC_KEYS.forEach(key=>{
    const st=students[key];let p=0,a=0,u=0;
    if(curDate&&st.length){st.forEach((_,i)=>{const r=getRecord(key,curDate,i);if(r==='P')p++;else if(r==='A')a++;else u++;});}
    destroyChart('pie-'+key);
    const el=document.getElementById('pie-'+key);
    if(el)chartInstances['pie-'+key]=new Chart(el,{type:'doughnut',data:{labels:['Present','Absent','Not marked'],datasets:[{data:[p,a,u],backgroundColor:['#1D9E75','#D85A30','#888'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  });

  SEC_KEYS.forEach(key=>{
    const sec=SECTIONS[key],st=students[key];
    const data=sundays.map(d=>{const p=st.filter((_,i)=>records[key+'|'+d+'|'+i]==='P').length;return st.length?Math.round(p/st.length*100):0;});
    destroyChart('bar-'+key);
    const el=document.getElementById('bar-'+key);
    if(el)chartInstances['bar-'+key]=new Chart(el,{type:'bar',data:{labels,datasets:[{label:'%',data,backgroundColor:sec.color,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:10},autoSkip:false}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y+'%'}}}}});
  });

  destroyChart('bar-all');
  const oEl=document.getElementById('bar-all');
  if(oEl){
    const datasets=SEC_KEYS.map(key=>({label:SECTIONS[key].label,data:sundays.map(d=>{const st=students[key];const p=st.filter((_,i)=>records[key+'|'+d+'|'+i]==='P').length;return st.length?Math.round(p/st.length*100):0;}),backgroundColor:SECTIONS[key].color,borderRadius:2}));
    chartInstances['bar-all']=new Chart(oEl,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},x:{ticks:{font:{size:10},autoSkip:false}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'%'}}}}});
  }
}
